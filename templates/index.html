<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinSolve · Internal Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --surface:   #13151c;
  --border:    #1e2130;
  --border2:   #252840;
  --accent:    #5b6ef5;
  --accent2:   #7c8dff;
  --success:   #3ecf8e;
  --warn:      #f5a623;
  --danger:    #f56565;
  --text:      #e8eaf0;
  --muted:     #6b7280;
  --muted2:    #4b5563;
  --user-bg:   #1e2244;
  --bot-bg:    #161820;
  --radius:    12px;
  --font-ui:   'DM Sans', sans-serif;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
}

/* ─── Layout ────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
}

/* ─── Sidebar ───────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 28px 20px 24px;
  gap: 0;
}

.logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 4px;
}

.logo span {
  color: var(--accent2);
}

.logo-sub {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  margin-bottom: 32px;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--muted2);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.user-card {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 24px;
}

.user-card .name {
  font-family: var(--font-head);
  font-weight: 600;
  font-size: 15px;
  color: var(--text);
}

.user-card .role-badge {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 500;
  background: rgba(91, 110, 245, 0.15);
  color: var(--accent2);
  border: 1px solid rgba(91, 110, 245, 0.3);
}

.sidebar-spacer { flex: 1; }

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  margin-right: 6px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.status-line {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}

.btn-logout {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--font-ui);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-logout:hover {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(245, 101, 101, 0.05);
}

/* ─── Main Panel ─────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.top-bar {
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.top-bar-title {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.top-bar-hint {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--font-mono);
}

/* ─── Chat Area ──────────────────────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--muted);
  text-align: center;
}

.empty-icon {
  font-size: 40px;
  opacity: 0.4;
  margin-bottom: 8px;
}

.empty-state h3 {
  font-family: var(--font-head);
  font-size: 18px;
  color: var(--muted2);
}

.empty-state p {
  font-size: 13px;
  max-width: 300px;
}

/* Message rows */
.msg-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { align-items: flex-end; }
.msg-row.bot  { align-items: flex-start; }

.msg-label {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  padding: 0 4px;
}

.bubble {
  max-width: 68%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}

.bubble.user {
  background: var(--user-bg);
  border: 1px solid rgba(91, 110, 245, 0.25);
  color: #c5caf5;
  border-bottom-right-radius: 3px;
}

.bubble.bot {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 3px;
}

/* Meta line (sources, rewritten query) */
.msg-meta {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  padding: 0 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.meta-tag {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
}

/* Warning banner */
.warn-banner {
  background: rgba(245, 166, 35, 0.08);
  border: 1px solid rgba(245, 166, 35, 0.25);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--warn);
  max-width: 68%;
}

/* Table */
.table-wrap {
  max-width: 90%;
  overflow-x: auto;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--bot-bg);
}

table {
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--font-mono);
  min-width: 100%;
}

th {
  background: rgba(91,110,245,0.08);
  color: var(--accent2);
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 8px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}

td {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  white-space: nowrap;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* Typing indicator */
.typing-bubble {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  border-bottom-left-radius: 3px;
  padding: 12px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted2);
  animation: bounce 1.2s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40%            { transform: translateY(-5px); opacity: 1; }
}

/* ─── Input Area ─────────────────────────────────────── */
.input-area {
  border-top: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  padding: 2px 6px;
  transition: border-color 0.2s;
}

.input-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,110,245,0.1);
}

#query-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  padding: 10px 10px;
  resize: none;
}

#query-input::placeholder { color: var(--muted2); }

.btn-send {
  width: 42px; height: 42px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.btn-send:hover:not(:disabled) {
  background: var(--accent2);
  transform: scale(1.05);
}

.btn-send:disabled {
  background: var(--muted2);
  cursor: not-allowed;
  transform: none;
}

.btn-send svg { pointer-events: none; }

/* ─── Login Screen ───────────────────────────────────── */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.login-card {
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 0;
  animation: fadeUp 0.35s ease;
}

.login-logo {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 4px;
}

.login-logo span { color: var(--accent2); }

.login-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 36px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.field label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--font-mono);
}

.field input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 11px 14px;
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(91,110,245,0.1);
}

.btn-login {
  margin-top: 8px;
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.btn-login:hover { background: var(--accent2); }
.btn-login:active { transform: scale(0.98); }

.login-error {
  margin-top: 14px;
  font-size: 12px;
  color: var(--danger);
  text-align: center;
  min-height: 18px;
}

/* ─── Scrollbar ──────────────────────────────────────── */
* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>

<!-- ── Login Screen ─────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Fin<span>Solve</span></div>
    <div class="login-sub">Internal Knowledge Assistant — sign in to continue</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="e.g. alice" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="btn-login" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────── -->
<div class="app" id="app-shell" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">Fin<span>Solve</span></div>
    <div class="logo-sub">INTERNAL ASSISTANT</div>

    <div class="sidebar-label">Signed in as</div>
    <div class="user-card">
      <div class="name" id="sb-username">—</div>
      <div class="role-badge" id="sb-role">—</div>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="status-line">
      <span class="status-dot"></span> System online
    </div>

    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign out
    </button>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="top-bar">
      <div class="top-bar-title">Ask anything within your scope</div>
      <div class="top-bar-hint" id="top-role-hint"></div>
    </div>

    <div class="chat-area" id="chat-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⬡</div>
        <h3>Start a conversation</h3>
        <p>Ask questions about your department's policies, data, or documentation.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="query-input"
               placeholder="Ask a question..."
               onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }" />
      </div>
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  let token = null;

  // ─── Login ───────────────────────────────────────────
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errEl    = document.getElementById("login-error");
    errEl.textContent = "";

    if (!username || !password) {
      errEl.textContent = "Please enter both username and password.";
      return;
    }

    try {
      const res  = await fetch("/login", {
        method:  "POST",
        headers: {"Content-Type": "application/json"},
        body:    JSON.stringify({ username, password })
      });

      if (res.ok) {
        const data = await res.json();
        token = data.token;

        document.getElementById("sb-username").textContent = data.username;
        document.getElementById("sb-role").textContent     = data.role;
        document.getElementById("top-role-hint").textContent = `role: ${data.role}`;

        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-shell").style.display    = "grid";
        document.getElementById("query-input").focus();
      } else {
        const err = await res.json();
        errEl.textContent = err.detail || "Login failed.";
      }
    } catch (e) {
      errEl.textContent = "Connection error. Is the server running?";
    }
  }

  // ─── Logout ──────────────────────────────────────────
  async function logout() {
    if (token) {
      await fetch("/logout", {
        method:  "POST",
        headers: { "authorization": token }
      }).catch(() => {});
      token = null;
    }
    document.getElementById("chat-area").innerHTML =
      `<div class="empty-state" id="empty-state">
        <div class="empty-icon">⬡</div>
        <h3>Start a conversation</h3>
        <p>Ask questions about your department's policies, data, or documentation.</p>
       </div>`;
    document.getElementById("app-shell").style.display    = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("password").value = "";
  }

  // ─── Send Message ─────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("query-input");
    const query = input.value.trim();
    if (!query) return;

    hideEmpty();
    appendUserMsg(query);
    input.value = "";
    setSending(true);

    const typingId = appendTyping();

    try {
      const res = await fetch("/chat", {
        method:  "POST",
        headers: {
          "Content-Type": "application/json",
          "authorization": token
        },
        body: JSON.stringify({ query })
      });

      removeTyping(typingId);

      if (res.status === 401) { logout(); return; }

      const data = await res.json();

      if (!res.ok) {
        appendWarning("⚠️ " + (data.detail || "Something went wrong."));
      } else if (data.type === "table") {
        appendTable(data.columns, data.rows, data.query);
      } else {
        if (data.rewritten_query && data.rewritten_query !== query) {
          appendMeta([`🔍 ${data.rewritten_query}`]);
        }
        if (!data.faithful) {
          appendWarning("⚠️ This answer may not be fully supported by source documents.");
        }
        appendBotMsg(data.answer);
        if (data.sources && data.sources.length) {
          appendMeta(data.sources.map(s => `📎 ${s}`));
        }
      }
    } catch (e) {
      removeTyping(typingId);
      appendWarning("⚠️ Network error. Please try again.");
    }

    setSending(false);
    scrollBottom();
  }

  // ─── DOM Helpers ──────────────────────────────────────
  function hideEmpty() {
    const e = document.getElementById("empty-state");
    if (e) e.remove();
  }

  function scrollBottom() {
    const area = document.getElementById("chat-area");
    area.scrollTop = area.scrollHeight;
  }

  function setSending(on) {
    const btn   = document.getElementById("send-btn");
    const input = document.getElementById("query-input");
    btn.disabled   = on;
    input.disabled = on;
  }

  function appendUserMsg(text) {
    const area = document.getElementById("chat-area");
    const row  = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `
      <div class="msg-label">You</div>
      <div class="bubble user">${esc(text)}</div>`;
    area.appendChild(row);
    scrollBottom();
  }

  function appendBotMsg(text) {
    const area = document.getElementById("chat-area");
    const row  = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `
      <div class="msg-label">FinSolve Assistant</div>
      <div class="bubble bot">${esc(text)}</div>`;
    area.appendChild(row);
  }

  function appendWarning(text) {
    const area = document.getElementById("chat-area");
    const row  = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `<div class="warn-banner">${esc(text)}</div>`;
    area.appendChild(row);
  }

  function appendMeta(tags) {
    const area = document.getElementById("chat-area");
    const div  = document.createElement("div");
    div.className = "msg-meta";
    div.innerHTML = tags.map(t => `<span class="meta-tag">${esc(t)}</span>`).join("");
    area.appendChild(div);
  }

  function appendTable(columns, rows, sqlQuery) {
    const area = document.getElementById("chat-area");
    const row  = document.createElement("div");
    row.className = "msg-row bot";

    let html = `<div class="msg-label">FinSolve Assistant · SQL Result</div>
                <div class="table-wrap"><table>
                <tr>${columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr>`;
    rows.forEach(r => {
      html += `<tr>${r.map(cell => `<td>${esc(String(cell ?? "—"))}</td>`).join("")}</tr>`;
    });
    html += `</table></div>`;
    row.innerHTML = html;
    area.appendChild(row);

    if (sqlQuery) {
      appendMeta([`🗄 ${sqlQuery}`]);
    }
  }

  function appendTyping() {
    const area = document.getElementById("chat-area");
    const row  = document.createElement("div");
    const id   = "typing-" + Date.now();
    row.id = id;
    row.className = "msg-row bot";
    row.innerHTML = `
      <div class="msg-label">FinSolve Assistant</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
    area.appendChild(row);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/\n/g, "<br>");
  }
</script>
</body>
</html>
